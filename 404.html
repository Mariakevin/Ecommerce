<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Chennai Retail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#dc2626', light: '#fecaca' },
                        surface: { DEFAULT: '#ffffff', alt: '#f7f7f7' },
                        'on-primary': '#ffffff',
                        text: { DEFAULT: '#111111', secondary: '#666666', tertiary: '#999999' },
                        border: { DEFAULT: '#e5e5e5', light: '#f0f0f0' },
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { sm: '4px', md: '8px', lg: '12px' },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-surface font-sans text-text">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full text-center">
            <!-- 404 -->
            <p class="text-[120px] md:text-[160px] font-bold text-primary/10 leading-none mb-4 select-none">404</p>

            <h1 class="text-2xl font-semibold mb-2">Page not found</h1>
            <p class="text-text-secondary text-sm mb-8">The page you're looking for doesn't exist or has been moved.</p>

            <!-- Actions -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="index.html" class="btn-primary px-6">Go Home</a>
                <a href="category.html" class="btn-outline px-6">Browse Categories</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
