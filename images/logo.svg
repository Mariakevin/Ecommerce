<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#B91C1C"/>
    </linearGradient>
  </defs>
  <!-- Red square with rounded corners -->
  <rect x="2" y="2" width="56" height="56" rx="10" fill="url(#redGrad)"/>
  <!-- CR monogram -->
  <text x="30" y="40" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">CR</text>
  <!-- Brand name -->
  <text x="68" y="26" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111111" letter-spacing="-0.5">CHENNAI</text>
  <text x="68" y="46" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6B7280" letter-spacing="2">RETAIL</text>
</svg>
