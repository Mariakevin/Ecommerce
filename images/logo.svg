<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 70" fill="none">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#B91C1C"/>
    </linearGradient>
  </defs>
  
  <!-- Icon: Shopping bag + home roof -->
  <g>
    <!-- Red rounded square -->
    <rect x="2" y="8" width="54" height="54" rx="10" fill="url(#redGrad)"/>
    
    <!-- Shopping bag body -->
    <path d="M18 28 L38 28 L36 48 L20 48 Z" fill="white" opacity="0.95"/>
    
    <!-- Bag handle -->
    <path d="M23 28 C23 21 25 18 28 18 C31 18 33 21 33 28" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Home roof accent -->
    <path d="M14 28 L28 19 L42 28" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text: CHENNAI RETAIL -->
  <text x="66" y="32" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="18" fill="#111111" letter-spacing="0.5">CHENNAI</text>
  <text x="66" y="52" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" fill="#6B7280" letter-spacing="3">RETAIL</text>
  
  <!-- Red accent line -->
  <rect x="66" y="36" width="45" height="2" rx="1" fill="#DC2626"/>
</svg>
