<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Chennai Retail</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #F3F4F6; color: #111; }
    .offline-container { text-align: center; padding: 2rem; max-width: 400px; }
    .offline-icon { font-size: 80px; color: #DC2626; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
    .btn { display: inline-flex; align-items: center; gap: 8px; background: #DC2626; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 500; transition: background 0.2s; }
    .btn:hover { background: #B91C1C; }
  </style>
</head>
<body>
  <div class="offline-container">
    <span class="material-symbols-outlined offline-icon">wifi_off</span>
    <h1>You're Offline</h1>
    <p>Please check your internet connection and try again. Your previously viewed products are still available.</p>
    <a href="index.html" class="btn">
      <span class="material-symbols-outlined" style="font-size:18px">home</span>
      Go to Homepage
    </a>
  </div>
</body>
</html>
