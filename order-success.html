<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed - Chennai Retail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#9a442d', light: '#e07a5f' },
                        surface: { DEFAULT: '#ffffff', alt: '#f7f7f7' },
                        'on-primary': '#ffffff',
                        text: { DEFAULT: '#111111', secondary: '#666666', tertiary: '#999999' },
                        border: { DEFAULT: '#e5e5e5', light: '#f0f0f0' },
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { sm: '4px', md: '8px', lg: '12px' },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-surface font-sans text-text">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full text-center">
            <!-- Success Icon -->
            <div class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center mx-auto mb-6">
                <span class="material-symbols-outlined text-primary" style="font-size:40px">check_circle</span>
            </div>

            <h1 class="text-2xl font-semibold mb-2">Order Placed!</h1>
            <p class="text-text-secondary text-sm mb-6">Thank you for shopping with us</p>

            <!-- Order Details -->
            <div class="border border-border rounded-lg p-5 mb-6 text-left">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs text-text-tertiary">Order Number</span>
                    <span id="orderNumber" class="text-sm font-semibold">#</span>
                </div>
                <div class="border-t border-border-light pt-4 space-y-3">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-text-tertiary" style="font-size:18px">shopping_bag</span>
                        <span id="orderItems" class="text-sm text-text-secondary">0 items</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-text-tertiary" style="font-size:18px">location_on</span>
                        <span class="text-sm text-text-secondary">22, Mahatma Gandhi Road, T. Nagar, Chennai - 600017</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-text-tertiary" style="font-size:18px">local_shipping</span>
                        <span id="orderDelivery" class="text-sm text-text-secondary"></span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex flex-col sm:flex-row gap-3">
                <a href="category.html" class="btn-primary flex-1 text-center">Continue Shopping</a>
                <a href="account.html" class="btn-outline flex-1 text-center">Track Order</a>
            </div>
        </div>
    </div>

    <script src="src/utils/format.js"></script>
    <script src="src/utils/constants.js"></script>
    <script src="src/store/EventBus.js"></script>
    <script src="src/services/ProductService.js"></script>
    <script src="src/services/CartService.js"></script>
    <script src="src/services/OrderService.js"></script>
    <script src="src/services/AuthService.js"></script>
    <script src="src/store/cartStore.js"></script>
    <script src="src/store/wishlistStore.js"></script>
    <script src="src/components/Toast.js"></script>
    <script src="src/components/ProductCard.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var orderId = getUrlParam('id');
            if (orderId) {
                var order = OrderService.getOrderById(orderId);
                if (order) {
                    document.getElementById('orderNumber').textContent = '#' + order.id;
                    document.getElementById('orderItems').textContent = order.items.length + ' items';
                    document.getElementById('orderDelivery').textContent = order.estimatedDelivery;
                }
            }
        });
    </script>
</body>
</html>
